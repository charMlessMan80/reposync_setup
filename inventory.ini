[repository_servers]
# Add your target servers here
# Format: hostname_or_ip ansible_user=username ansible_password=password
# or use SSH keys with ssh_key_file

# Example:
# repo-server-1 ansible_host=192.168.1.100 ansible_user=root
# repo-server-2 ansible_host=repo.example.com ansible_user=ansibleuser
