# Ansible Inventory Example for Repository Server Deployment
# Copy this file to inventory.ini and update with your actual server details

[repository_servers]
# Single server with IP and username
# repo-server-1 ansible_host=192.168.1.100 ansible_user=root

# Multiple servers
# repo-server-1 ansible_host=repo1.example.com ansible_user=root
# repo-server-2 ansible_host=repo2.example.com ansible_user=root
# repo-server-3 ansible_host=192.168.1.100 ansible_user=ansible

# Server with custom SSH port
# repo-server-prod ansible_host=repo.prod.example.com ansible_user=root ansible_port=2222

# Server with SSH key authentication
# repo-server-secure ansible_host=192.168.1.50 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[repository_servers:vars]
# Common variables for all servers in this group
ansible_connection=ssh
ansible_port=22
ansible_user=root

# Optional: If using password authentication (not recommended for production)
# ansible_password=your_password_here

# Optional: If using a specific SSH key for all servers
# ansible_ssh_private_key_file=~/.ssh/ansible_key

# Optional: Python interpreter path (if different from default)
# ansible_python_interpreter=/usr/bin/python3

[all:vars]
# Global variables for all hosts
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
